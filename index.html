<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f1ea">
    <meta name="description" content="ケイスケの誕生日を祝う、7本のお祝い動画をまとめた特設ページです。">
    <title>KEISUKE 2026｜Birthday Special</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="interstitials.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-mark" href="#top" aria-label="ページ先頭へ">
        <span>KEISUKE</span>
        <strong>2026</strong>
      </a>
      <p id="progress-label" class="watch-progress" aria-live="polite">0 / 7 WATCHED</p>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="page-title">
        <p class="hero-date">2026. BIRTHDAY SPECIAL</p>
        <h1 id="page-title">
          <span>HAPPY</span>
          <span>BIRTHDAY</span>
          <em>KEISUKE</em>
        </h1>
        <div class="hero-copy">
          <p>7人から、お祝いの映像が届きました。</p>
          <p>上から順に見ても、気になるものから見ても大丈夫です。</p>
        </div>
        <a class="jump-link" href="#messages">動画を見る <span aria-hidden="true">↓</span></a>
      </section>

      <section id="messages" class="messages" aria-labelledby="messages-title">
        <div class="section-heading">
          <p>MESSAGES</p>
          <h2 id="messages-title">お祝い動画</h2>
        </div>
        <div id="message-list" class="message-list"></div>
      </section>

      <section id="finale" class="finale" aria-labelledby="finale-title" hidden>
        <p class="finale-label">ALL MESSAGES WATCHED</p>
        <h2 id="finale-title">誕生日おめでとう。</h2>
        <p class="finale-copy">今年もいい一年になりますように。<br>最後まで見てくれてありがとう。</p>
        <div class="finale-actions">
          <button id="music-button" class="text-button" type="button" hidden>音楽を再生する</button>
          <button id="restart-button" class="text-button" type="button">最初から見る</button>
        </div>
      </section>
    </main>

    <template id="message-template">
      <article class="message-item">
        <header class="message-heading">
          <p class="message-number"></p>
          <div>
            <h3 class="message-name"></h3>
            <p class="message-theme"></p>
          </div>
          <p class="message-state" aria-live="polite">未視聴</p>
        </header>

        <div class="video-stage">
          <video class="message-video" controls playsinline preload="metadata"></video>
          <p class="video-error" hidden>動画を読み込めませんでした。</p>
        </div>

        <p class="message-comment"></p>
      </article>
    </template>

    <template id="fanclub-template">
      <section class="interstitial fanclub-ad" aria-labelledby="fanclub-title">
        <div class="fanclub-visual" aria-hidden="true">
          <span>IKENAGA OFFICIAL FAN CLUB</span>
        </div>
        <div class="fanclub-copy">
          <div>
            <p class="fanclub-kicker">ADVERTISEMENT / MEMBERS WANTED</p>
            <h2 id="fanclub-title">IKENAGA<span>OFFICIAL FAN CLUB</span></h2>
            <p class="fanclub-lead">ケイスケを応援する意思だけで入会できます。本人の了承は、現在確認中です。</p>
          </div>
          <ul class="fanclub-benefits" aria-label="入会特典">
            <li>会員証<br>会員番号は全員 0001</li>
            <li>ケイスケの誕生日を<br>堂々と祝う権利</li>
            <li>年1回の<br>活動報告メール</li>
            <li>本人非公認<br>記念ステッカー</li>
          </ul>
          <p class="fanclub-note">※入会金・年会費・活動内容は、まだ何も決まっていません。</p>
        </div>
      </section>
    </template>

    <template id="premium-template">
      <section class="interstitial premium-teaser" aria-labelledby="premium-title">
        <div class="premium-band">
          <span>IKENAGA FAN CLUB</span>
          <strong>PREMIUM</strong>
        </div>
        <div class="premium-heading">
          <p class="premium-kicker">MEMBERS ONLY</p>
          <h2 id="premium-title">一部コンテンツは会員限定です</h2>
        </div>
        <div class="premium-preview" aria-hidden="true">
          <article class="premium-card">
            <b>ケイスケの朝食予想</b>
            <p>独自の調査により、朝食の内容を高精度で予測します。</p>
          </article>
          <article class="premium-card">
            <b>未公開プロフィール</b>
            <p>好きな信号機の色など、知らなくても困らない情報を掲載。</p>
          </article>
          <article class="premium-card">
            <b>会員限定レポート</b>
            <p>今月のケイスケについて、特に根拠なくまとめました。</p>
          </article>
        </div>
        <p class="premium-note">現在、プレミアム会員は募集していません。</p>
      </section>
    </template>

    <footer class="site-footer">
      <p>KEISUKE BIRTHDAY SPECIAL 2026</p>
    </footer>

    <noscript>このサイトを表示するにはJavaScriptを有効にしてください。</noscript>
  </body>
</html>
